name: C CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential sqlite3 libsqlite3-dev curl

      - name: Run tests
        run: make test

      - name: Build app
        run: make build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web app
        run: npm run build
